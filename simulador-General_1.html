<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header h2 {
            font-size: 1.2em;
            font-weight: normal;
            opacity: 0.95;
        }

        .header h3 {
            font-size: 1em;
            font-weight: normal;
            opacity: 0.9;
            margin-top: 5px;
        }

        .progress-bar {
            background: #f0f0f0;
            height: 8px;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .content {
            padding: 40px;
        }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

            height: 45px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .question-dot:hover {
            background: #d0d0d0;
            transform: scale(1.1);
        }

        .question-dot.answered {
            background: #667eea;
            color: white;
        }

        .question-dot.current {
            background: #764ba2;
            color: white;
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.5);
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #333;
            white-space: pre-line;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
        }

        .option:hover {
            background: #f0f0f0;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option.selected {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .option-label {
            font-weight: bold;
            margin-right: 15px;
            font-size: 1.2em;
            min-width: 30px;
        }

        .option-text {
            flex: 1;
            line-height: 1.5;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            display: none;
            text-align: center;
        }

        .results.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
            margin: 30px 0;
        }

        .score-message {
            font-size: 1.5em;
            margin-bottom: 30px;
            color: #555;
        }

        .question-review {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .review-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .review-item:last-child {
            border-bottom: none;
        }

        .correct {
            color: #28a745;
            font-weight: bold;
        }

        .incorrect {
            color: #dc3545;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }

            .question-grid {
                grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
                gap: 8px;
            }

            .question-dot {
                width: 40px;
                height: 40px;
                font-size: 0.8em;
            }

            .content {
                padding: 20px;
            }

            .navigation {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Simulador General 2 - Completo</h1>

    <script>
        const questions = [
            // PARTE 1: Preguntas 1-30
            {
                number: 1,
                text: "¿Cuál de las siguientes acciones o actividades responde a un diseño universal de aprendizaje?",

                    { label: "A", text: "La maestra Verónica realiza adecuaciones a sus situaciones didácticas para que Nelly pueda realizar el trabajo de la misma forma que el resto del grupo" },

        let currentQuestion = 0;
        let userAnswers = {};

        function initQuiz() {
            renderQuestionGrid();
            renderQuestions();
            showQuestion(0);
            updateProgress();
        }

        function renderQuestionGrid() {
            const grid = document.getElementById('questionGrid');
            grid.innerHTML = '';
            questions.forEach((q, index) => {
                const dot = document.createElement('div');
                dot.className = 'question-dot';
                dot.textContent = q.number;
                dot.onclick = () => showQuestion(index);
                dot.id = `dot-${index}`;
                grid.appendChild(dot);
            });
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container';
                questionDiv.id = `question-${index}`;

                questionDiv.innerHTML = `
                    <div class="question-number">Pregunta ${q.number} de ${questions.length}</div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
                        ${q.options.map(opt => `
                            <div class="option" onclick="selectAnswer(${index}, '${opt.label}')">
                                <div class="option-label">${opt.label})</div>
                                <div class="option-text">${opt.text}</div>
                            </div>
                        `).join('')}
                    </div>
                `;

                container.appendChild(questionDiv);
            });
        }

        function showQuestion(index) {
            document.querySelectorAll('.question-container').forEach(q => q.classList.remove('active'));
            document.getElementById(`question-${index}`).classList.add('active');
            
            document.querySelectorAll('.question-dot').forEach(dot => dot.classList.remove('current'));
            document.getElementById(`dot-${index}`).classList.add('current');

            currentQuestion = index;
            updateNavigation();
            updateProgress();
            
            // Restaurar respuesta seleccionada si existe
            if (userAnswers[index]) {
                const questionDiv = document.getElementById(`question-${index}`);
                const options = questionDiv.querySelectorAll('.option');
                options.forEach(opt => {
                    const label = opt.querySelector('.option-label').textContent.replace(')', '');
                    if (label === userAnswers[index]) {
                        opt.classList.add('selected');
                    }
                });
            }
        }

        function selectAnswer(questionIndex, answer) {
            userAnswers[questionIndex] = answer;
            
            const questionDiv = document.getElementById(`question-${questionIndex}`);
            questionDiv.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            
            const selectedOption = Array.from(questionDiv.querySelectorAll('.option')).find(opt => 
                opt.querySelector('.option-label').textContent.replace(')', '') === answer
            );
            if (selectedOption) {
                selectedOption.classList.add('selected');
            }

            document.getElementById(`dot-${questionIndex}`).classList.add('answered');
            updateProgress();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                showQuestion(currentQuestion + 1);
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                showQuestion(currentQuestion - 1);
            }
        }

        function updateNavigation() {
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            
            if (currentQuestion === questions.length - 1) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('finishBtn').style.display = 'block';
            } else {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('finishBtn').style.display = 'none';
            }
        }

        function updateProgress() {
            const answered = Object.keys(userAnswers).length;
            const progress = (answered / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function finishQuiz() {
            if (Object.keys(userAnswers).length < questions.length) {
                const unanswered = questions.length - Object.keys(userAnswers).length;
                if (!confirm(`Tienes ${unanswered} pregunta(s) sin responder. ¿Deseas finalizar de todos modos?`)) {
                    return;
                }
            }

            let correct = 0;
            let reviewHTML = '<div class="question-review">';

            questions.forEach((q, index) => {
                const userAnswer = userAnswers[index] || 'Sin responder';
                const isCorrect = userAnswer === q.correctAnswer;
                if (isCorrect) correct++;

                reviewHTML += `
                    <div class="review-item">
                        <strong>Pregunta ${q.number}:</strong> ${isCorrect ? '<span class="correct">✓ Correcta</span>' : '<span class="incorrect">✗ Incorrecta</span>'}<br>
                        Tu respuesta: ${userAnswer}<br>
                        Respuesta correcta: ${q.correctAnswer}
                    </div>
                `;
            });

            reviewHTML += '</div>';

            const score = ((correct / questions.length) * 100).toFixed(1);
            document.getElementById('score').textContent = `${correct}/${questions.length} (${score}%)`;
            
            let message = '';
            if (score >= 90) message = '¡Excelente desempeño!';
            else if (score >= 70) message = '¡Buen trabajo!';
            else if (score >= 50) message = 'Aprobado, pero puedes mejorar';
            else message = 'Necesitas estudiar más';

            document.getElementById('scoreMessage').textContent = message;
            document.getElementById('reviewContainer').innerHTML = reviewHTML;

            document.getElementById('questionsContainer').style.display = 'none';
            document.getElementById('navigation').style.display = 'none';
            document.getElementById('questionGrid').style.display = 'none';
            document.getElementById('results').classList.add('active');
        }

        function resetQuiz() {
            currentQuestion = 0;
            userAnswers = {};
            
            document.getElementById('questionsContainer').style.display = 'block';
            document.getElementById('navigation').style.display = 'flex';
            document.getElementById('questionGrid').style.display = 'grid';
            document.getElementById('results').classList.remove('active');
            
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.question-dot').forEach(dot => dot.classList.remove('answered'));
            
            initQuiz();
        }

        // Inicializar al cargar
        initQuiz();
    </script>
